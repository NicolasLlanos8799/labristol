<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Catálogo La Bristol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/catalog.css" />
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header__titles">
                <h1>La Bristol</h1>
                <p>Catálogo de Productos</p>
            </div>
            <div class="header__actions">
                <!-- ID MANTENIDO -->
                <div id="health" class="health-status">V</div>
                <button id="cartBtn" class="cart-btn" aria-label="Abrir carrito" type="button">
                    🛒 <span id="cartCount" class="cart-count">0</span>
                </button>
            </div>
        </header>

        <main>
            <!-- ID MANTENIDO -->
            <ul id="products" class="products-grid">
                <li class="skeleton"></li>
                <li class="skeleton"></li>
                <li class="skeleton"></li>
                <li class="skeleton"></li>
            </ul>
        </main>
    </div>

    <!-- CAROUSEL / DRAWER CARRITO -->
    <div id="cartOverlay" class="cart-overlay hidden"></div>
    <aside id="cartDrawer" class="cart-drawer hidden" aria-hidden="true">
        <div class="cart-drawer__header">
            <h3>Tu pedido</h3>
            <button id="cartCloseBtn" class="cart-close" aria-label="Cerrar carrito">✕</button>
        </div>

        <div id="cartItems" class="cart-items">
            <!-- Renderizado por JS -->
        </div>

        <div class="cart-drawer__footer">
            <div class="cart-total">
                <span>Total</span>
                <strong id="cartTotal">€0.00</strong>
            </div>
            <div class="cart-actions">
                <button id="cartClearBtn" class="btn btn--secondary" type="button">Vaciar</button>
                <button id="cartCheckoutBtn" class="btn btn--primary" type="button">Realizar pedido</button>
            </div>
        </div>
    </aside>

    <!-- MODAL CHECKOUT -->
    <div id="checkoutOverlay" class="cart-overlay hidden"></div>
    <div id="checkoutModal" class="checkout-modal hidden" aria-hidden="true" role="dialog">
        <div class="checkout-modal__header">
            <h3>Finalizar Pedido</h3>
            <button id="checkoutCloseBtn" class="cart-close" aria-label="Cerrar checkout" type="button">✕</button>
        </div>
        <div class="checkout-modal__content">
            <div id="checkoutItems" class="checkout-items-summary"></div>
            <div class="checkout-total-summary">
                <span>Total a pagar:</span>
                <strong id="checkoutTotal">€0.00</strong>
            </div>

            <form id="checkoutForm" class="checkout-form">
                <div class="form-group">
                    <label for="inputName">Nombre completo *</label>
                    <input type="text" id="inputName" required placeholder="Ej: Maria Lopez" />
                </div>
                <div class="form-group">
                    <label for="inputPhone">Teléfono *</label>
                    <input type="tel" id="inputPhone" required placeholder="Ej: +34 600 000 000" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="selectDelivery">Entrega *</label>
                        <select id="selectDelivery" required>
                            <option value="pickup">Recogida en local</option>
                            <option value="delivery">Envío a domicilio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="selectPayment">Pago *</label>
                        <select id="selectPayment" required>
                            <option value="cash">Efectivo</option>
                            <option value="mobilepay">MobilePay</option>
                            <option value="card">Tarjeta</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="inputAddress">Dirección de envío</label>
                    <input type="text" id="inputAddress" placeholder="Solo si seleccionas envío a domicilio" />
                </div>
                <div class="form-group">
                    <label for="inputNotes">Notas adicionales</label>
                    <textarea id="inputNotes" rows="2" placeholder="Ej: Sin cebolla, llamar al llegar..."></textarea>
                </div>

                <div class="checkout-modal__footer">
                    <button id="confirmOrderBtn" class="btn btn--primary" type="submit">Confirmar Pedido</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JS Y SOCKET MANTENIDOS ESTRICTAMENTE -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/catalog.js"></script>
</body>

</html>
